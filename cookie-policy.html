<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cookie Policy — Mixbook</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .construction {
    max-width: 480px;
    margin: 0 auto;
    padding: 120px 24px;
    text-align: center;
  }
  .construction__icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    border-radius: 50%;
    background: var(--color-primary-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .construction h1 {
    color: var(--color-primary);
    margin-bottom: 8px;
  }
  .construction p {
    color: var(--color-text-muted);
    line-height: 1.6;
  }
  .construction a {
    color: var(--color-primary);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>
</head>
<body>
  <main class="construction">
    <div class="construction__icon" aria-hidden="true">🚧</div>
    <h1>Page under construction</h1>
    <p>Our Cookie Policy page is on its way. In the meantime, you can review what cookies we use from the
      <a href="index.html">cookie settings panel</a> on the homepage.</p>
  </main>
</body>
</html>
